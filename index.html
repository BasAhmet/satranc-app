<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Satranç Akademisi</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<!-- <body class="bg-gray-50 text-gray-800 flex flex-col items-center justify-center min-h-screen"> -->
<body class="bg-gray-50 text-gray-800 flex flex-col items-center justify-start md:justify-center min-h-screen pt-6 md:pt-0">
    <div id="lobby-screen" class="fixed inset-0 bg-slate-900 z-50 flex items-center justify-center">
    <div class="bg-white p-8 rounded-lg shadow-xl text-center max-w-md w-full mx-4">
        <h1 class="text-3xl font-bold mb-2 text-slate-800">Satranç Platformu</h1>
        <p class="text-slate-500 mb-8">Oynamak için bir oda kurun veya katılın.</p>

        <!-- BOTA KARŞI OYNAMA ALANI -->
        <div class="mt-4 p-4 bg-slate-100 rounded-lg border border-slate-300 shadow-sm">
            <label for="bot-difficulty" class="block text-sm font-bold text-slate-700 mb-2">Bot Zorluk Seviyesi:</label>
            <select id="bot-difficulty" class="w-full mb-4 p-2 border border-slate-300 rounded text-slate-700 bg-white focus:outline-none focus:ring-2 focus:ring-purple-500 cursor-pointer">
                <option value="1">1. Seviye: Çırak (Rastgele Hamleler)</option>
                <option value="2">2. Seviye: Açgözlü (Fırsatçı Puanlama)</option>
                <option value="3">3. Seviye: Taktiksel (Konum Analizi)</option>
                <option value="4">4. Seviye: Analitik (Derinlik 2 - Minimax)</option>
                <option value="5">5. Seviye: Büyükusta (Derinlik 3+ Alpha-Beta)</option>
            </select>
            <select id="botColorSelect" style="margin-bottom: 10px; padding: 5px;">
                <option value="white">Beyaz Taşlar (Siz Başlarsınız)</option>
                <option value="black">Siyah Taşlar (Bot Başlar)</option>
            </select>
            <button id="btn-bot-play" class="w-full bg-purple-600 text-white px-6 py-3 rounded-md font-bold hover:bg-purple-700 transition-colors shadow-sm">
                🤖 Bota Karşı Oyna
            </button>

            <div class="mb-4">
        <button id="btn-local-play" class="w-full mt-4 bg-emerald-600 text-white px-6 py-3 rounded-md font-bold hover:bg-emerald-700 transition-colors shadow-sm">
            📱 Aynı Cihazdan Karşılıklı Oyna
        </button>
        </div>
        <div>
        <button id="btn-create-room" class="w-full bg-blue-600 text-white py-3 rounded-md mb-6 hover:bg-blue-700 font-bold transition-colors">
            Yeni Oda Kur (Beyaz)
        </button>
        </div>
            
        </div>
        
        <div class="relative flex py-5 items-center">
            <div class="flex-grow border-t border-slate-300"></div>
            <span class="flex-shrink-0 mx-4 text-slate-400 text-sm">veya</span>
            <div class="flex-grow border-t border-slate-300"></div>
        </div>
        <div class="flex gap-2">
            <input type="text" id="input-room-code" placeholder="Oda Kodu (Örn: A7X9)" class="border-2 border-slate-300 p-3 flex-1 rounded-md uppercase text-center font-bold tracking-widest focus:border-blue-500 outline-none">
            <button id="btn-join-room" class="bg-slate-800 text-white py-3 px-6 rounded-md hover:bg-slate-900 font-bold transition-colors">
                Katıl (Siyah)
            </button>
        </div>
    </div>
</div>

    <div class="w-full max-w-4xl p-4 text-center">
        
        <h1 class="text-3xl md:text-4xl font-bold tracking-tight">Satranç Platformu</h1>
        <p class="text-gray-500">Hamle hesaplamaları, zeka bulmacaları ve karşılıklı maçlar.</p>
        <!-- Oda kodunu maç esnasında göstereceğimiz yeni alan -->
<div id="room-code-display" class="text-sm text-slate-600 mb-2 hidden text-center">
    Oda Kodu: <span id="room-code-text" class="font-bold text-indigo-600 bg-slate-100 px-2 py-0.5 rounded select-all cursor-pointer" title="Kopyalamak için tıklayın">----</span>
</div>
        <p id="turn-indicator" class="text-lg font-semibold text-slate-900">Sıra: <span class="text-slate-800">Beyaz</span></p>
        <button id="btn-restart" class="bg-indigo-600 text-white px-6 py-2 rounded-md font-bold hover:bg-indigo-700 transition-colors shadow-sm">
            🔄 Yeni Oyun / Rövanş
        </button>
        <div class="flex flex-col md:flex-row mx-auto w-full max-w-[min(100vw,800px)] px-2 md:px-0 border-2 border-slate-700 shadow-sm rounded-sm overflow-hidden bg-slate-50">
                    
            <div id="board-container" class="grid grid-cols-8 md:border-r-2 border-slate-700 bg-white w-full md:w-[600px] aspect-square shrink-0"></div>
                    
            <div class="w-full md:w-48 bg-slate-50 flex flex-col h-20 md:h-auto md:max-h-[600px] border-t-2 md:border-t-0 border-slate-700">
    
                <div class="bg-slate-800 text-slate-100 text-center py-1.5 text-xs font-semibold tracking-wider uppercase shrink-0">
                    Hamle Geçmişi
                </div>    
                <div id="move-history" class="flex-1 flex flex-row md:flex-col overflow-x-auto overflow-y-hidden md:overflow-y-auto md:overflow-x-hidden px-3 py-2 text-slate-800 font-mono text-sm items-center md:items-stretch gap-6 md:gap-0 scroll-smooth select-text whitespace-nowrap">
                    </div>
            </div>
        </div>
    </div>
        <div id="promotion-modal" class="hidden fixed inset-0 bg-slate-900 bg-opacity-50 flex items-center justify-center z-50">
        <div class="bg-white p-6 rounded-md shadow-xl text-center max-w-sm w-full mx-4">
            <h2 class="text-xl font-bold mb-4 text-slate-800 tracking-tight">Piyon Terfisi</h2>
            <p class="text-sm text-slate-500 mb-6">Lütfen terfi etmek istediğiniz taşı seçin:</p>
            
            <div id="promotion-options" class="flex gap-4 justify-center"></div>
        </div>
    </div>
    <script type="module" src="script.js"></script>
</body>
</html>
