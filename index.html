<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Satranç Akademisi</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<!-- <body class="bg-gray-50 text-gray-800 flex flex-col items-center justify-center min-h-screen"> -->
<body class="bg-gray-50 text-gray-800 flex flex-col items-center justify-start md:justify-center min-h-screen pt-6 md:pt-0">

    <div class="w-full max-w-4xl p-4 text-center">
        
        <h1 class="text-3xl md:text-4xl font-bold tracking-tight mb-2">Satranç Platformu</h1>
        <p class="text-gray-500 mb-8">Hamle hesaplamaları, zeka bulmacaları ve karşılıklı maçlar.</p>
        <p id="turn-indicator" class="text-lg font-semibold text-slate-900 mb-8">Sıra: <span class="text-slate-800">Beyaz</span></p>
        
        <div class="flex flex-col md:flex-row gap-8 justify-center items-start mt-10">
            <div id="board-container"></div>
            
            <div class="w-80 h-80 sm:h-96 border-2 border-slate-700 bg-slate-50 rounded-sm overflow-hidden flex flex-col shadow-sm">
                <div class="bg-slate-800 text-slate-100 text-center py-2 text-sm font-semibold tracking-wider uppercase">
                    Hamle Geçmişi
                </div>
                <div id="move-history" class="flex-1 overflow-y-auto p-4 text-slate-800 font-mono text-sm space-y-2 select-text">
                    </div>
            </div>

        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
